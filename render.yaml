services:
  - type: web
    name: matrix-marketing
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: USDT_WALLET_TRC20
        sync: false
